<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Proposte Alpinistiche Sconce</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 1.3rem;
    }
    #map {
      height: 70vh;      /* invece di 600px fisso: si adatta all'altezza schermo */
      width: 100%;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }
    #status {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;      /* evita che il log allunghi la pagina all'infinito */
      white-space: pre-wrap; /* evita overflow orizzontale su testi lunghi */
    }
    #status.collapsed {
      display: none;
    }
    button {
      width: 100%;           /* più facile da toccare su mobile */
      padding: 12px;
      margin-bottom: 10px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;       /* evita che iOS Safari faccia zoom automatico sul tap */
    }
    
    @media (max-width: 480px) {
      #map { height: 60vh; }
      #status { font-size: 10px; }
    }
  </style>
</head>

<body>
  <h1>Dove vediamo che andiamo?</h1>
  <button onclick="clearCache()">
  Ricarica punti su mappa
  </button>
  <div id="filters" style="margin-bottom: 10px; font-family: Arial, sans-serif;">
    <label style="margin-right: 12px;"><input type="checkbox" class="cn-filter" value="A" checked> A</label>
    <label style="margin-right: 12px;"><input type="checkbox" class="cn-filter" value="B" checked> B</label>
    <label style="margin-right: 12px;"><input type="checkbox" class="cn-filter" value="C" checked> C</label>
    <label><input type="checkbox" class="cn-filter" value="Others" checked> Others</label>
  </div>
  
  <div id="map"></div>
  <button onclick="toggleStatus()" id="toggleBtn" style="padding: 8px; margin-bottom: 10px; background: #ddd; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
  Mostra log ▼
  </button>
  <div id="status" class="collapsed">Loading...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <script>
    const statusDiv = document.getElementById('status');
    let markerCount = 0;
    let allMarkers = []; // { marker, category }
    let geocodeCount = 0;

    // Initialize map
    const map = L.map('map').setView([46.5, 12.2], 7);
    
    // Add tile layer (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Marker icons initializations
    const iconSize = [32, 32];      // larghezza, altezza in pixel — regola secondo le tue immagini
    const iconAnchor = [16, 32];    // punto dell'icona che "punta" esattamente sulle coordinate (di solito centro-basso)
    const popupAnchor = [0, -32];   // da dove parte il popup rispetto all'icona
    
    const icons = {
      A: L.icon({
        iconUrl: 'sources/img/icons/icon_a.jpg',
        iconSize, iconAnchor, popupAnchor
      }),
      B: L.icon({
        iconUrl: 'sources/img/icons/icon_b.png',
        iconSize, iconAnchor, popupAnchor
      }),
      C: L.icon({
        iconUrl: 'sources/img/icons/icon_c.png',
        iconSize, iconAnchor, popupAnchor
      }),
      Others: L.icon({
        iconUrl: 'sources/img/icons/icon-others.png',
        iconSize, iconAnchor, popupAnchor
      })
    };
    
    // Geocode location by name using Nominatim
    async function getCoordinatesFromName(name) {
      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}`
        );
        const data = await response.json();
        
        if (data && data.length > 0) {
          return {
            lat: parseFloat(data[0].lat),
            lng: parseFloat(data[0].lon)
          };
        }
        return null;
      } catch (error) {
        console.error(`Geocoding failed for "${name}":`, error);
        return null;
      }
    }

    // Clear cache for locations
    function clearCache() {
      localStorage.removeItem('geocodeCache');
      location.reload();
    }

    // Toggle status visualization
    function toggleStatus() {
      const status = document.getElementById('status');
      const btn = document.getElementById('toggleBtn');
      status.classList.toggle('collapsed');
      btn.textContent = status.classList.contains('collapsed') ? 'Mostra log ▼' : 'Nascondi log ▲';
    }

    function applyFilters() {
      const checked = Array.from(document.querySelectorAll('.cn-filter:checked'))
        .map(cb => cb.value);
    
      allMarkers.forEach(({ marker, category }) => {
        if (checked.includes(category)) {
          if (!map.hasLayer(marker)) marker.addTo(map);
        } else {
          if (map.hasLayer(marker)) map.removeLayer(marker);
        }
      });
    }
    
    // Collega i checkbox alla funzione di filtro
    document.querySelectorAll('.cn-filter').forEach(cb => {
      cb.addEventListener('change', applyFilters);
    });
    
    // Update status
    function updateStatus(msg) {
      console.log(msg);
      statusDiv.textContent += msg + '\n';
    }

    // Load and parse CSV
    Papa.parse('sources/csv/vie.csv', {
      download: true,
      complete: async function(results) {
        updateStatus('=== CSV PARSING COMPLETE ===');
        updateStatus('Total rows: ' + results.data.length);
        
        // Find headers (try multiple common positions)
        let headers = null;
        let headerIndex = -1;
        
        for (let i = 0; i < Math.min(10, results.data.length); i++) {
          const row = results.data[i];
          if (row && row.length > 0 && row.some(cell => cell && cell.toLowerCase && cell.toLowerCase().includes('nome'))) {
            headers = row;
            headerIndex = i;
            break;
          }
        }
        
        if (!headers) {
          updateStatus('ERROR: Headers not found');
          return;
        }
        
        updateStatus(`Headers found at row ${headerIndex}: ${JSON.stringify(headers)}`);
        
        // Get column indices
        const latIndex = headers.indexOf('lat');
        const lngIndex = headers.indexOf('lng');
        const nameIndex = headers.indexOf('NOME CIMA');
        const risorseIndex = headers.findIndex(h => h && h.toLowerCase().startsWith('risors'));
        const noteIndex = headers.indexOf('NOTE');
        const cnIndex = headers.indexOf('CN');
        
        updateStatus(`Columns - lat: ${latIndex}, lng: ${lngIndex}, name: ${nameIndex}, note: ${noteIndex}`);
        updateStatus('\n=== PROCESSING LOCATIONS ===');
        
        // Get data rows (skip header row)
        const rows = results.data.slice(headerIndex + 1);
        
        // Process each row
        for (const row of rows) {
          if (!row || row.length === 0) continue;
          
          let lat = latIndex >= 0 ? parseFloat(row[latIndex]) : NaN;
          let lng = lngIndex >= 0 ? parseFloat(row[lngIndex]) : NaN;
          const name = nameIndex >= 0 ? row[nameIndex] : '';
          const risorse = risorseIndex >= 0 ? row[risorseIndex] : '';
          const note = noteIndex >= 0 ? row[noteIndex] : '';
          const cn = noteIndex >= 0 ? row[cnIndex] : '';
          
          // If lat/lng invalid, geocode by name
          if (isNaN(lat) || isNaN(lng)) {
            if (name && name.trim()) {
              updateStatus(`Geocoding: ${name}...`);
              const coords = await getCoordinatesFromName(name);
              if (coords) {
                lat = coords.lat;
                lng = coords.lng;
                geocodeCount++;
                updateStatus(`✓ Found: [${lat}, ${lng}]`);
              } else {
                updateStatus(`✗ Geocoding failed for: ${name}`);
                continue;
              }
            } else {
              continue;
            }
          }
          
          // Add marker to map
          if (!isNaN(lat) && !isNaN(lng)) {
            let popupContent = `<b>${cn || 'X'} - ${name}</b><br>${note || 'No notes'}`;
          
            const link = (risorse || '').trim();
            if (link && (link.startsWith('http://') || link.startsWith('https://'))) {
              popupContent += `<br><a href="${link}" target="_blank" rel="noopener noreferrer" style="display:inline-block; margin-top:6px; padding:4px 10px; background:#4a90d9; color:white; text-decoration:none; border-radius:4px; font-size:12px;">🔗 Apri risorsa</a>`;
            }
          
            // Normalizza la categoria: se non è A, B o C, va in "Others"
            const cnValue = (cn || '').trim().toUpperCase();
            const category = ['A', 'B', 'C'].includes(cnValue) ? cnValue : 'Others';

            const marker = L.marker([lat, lng], { icon: icons[category] })
              .bindPopup(popupContent, { maxWidth: 250, minWidth: 150 });
          
            allMarkers.push({ marker, category });
            markerCount++;
          }
        }
        applyFilters(); // mostra tutti i punti secondo lo stato iniziale dei checkbox
        
        updateStatus(`\n=== COMPLETE ===`);
        updateStatus(`Markers added: ${markerCount}`);
        updateStatus(`Locations geocoded: ${geocodeCount}`);
      },
      error: function(error) {
        updateStatus('CSV parsing error: ' + JSON.stringify(error));
      }
    });
  </script>
</body>
</html>
