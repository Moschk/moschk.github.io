<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS Map Visualization</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 600px;
      border: 1px solid #ccc;
    }
    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>Dove possiamo andiamo?</h1>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <script>
    // Initialize map
    const map = L.map('map').setView([46.5, 12.2], 7);
    
    // Add tile layer (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Load and parse CSV
    Papa.parse('sources/csv/gps_test.csv', {
      download: true,
      complete: function(results) {
        // Skip first 6 metadata rows, use row 7 (index 6) as headers
        const headers = results.data[6];
        const rows = results.data.slice(7);
        
        // Find column indices
        const latIndex = headers.indexOf('lat');
        const lngIndex = headers.indexOf('lng');
        const nameIndex = headers.indexOf('NOME CIMA');
        const noteIndex = headers.indexOf('NOTE');
        
        rows.forEach(row => {
          const lat = parseFloat(row[latIndex]);
          const lng = parseFloat(row[lngIndex]);
          const name = row[nameIndex];
          const note = row[noteIndex];
          
          // Only create marker if lat/lng are valid numbers
          if (!isNaN(lat) && !isNaN(lng) && lat && lng) {
            const marker = L.marker([lat, lng])
              .bindPopup(`<b>${name}</b><br>${note || 'No notes'}`)
              .addTo(map);
          }
        });
      },
      error: function(error) {
        console.error('Error parsing CSV:', error);
      }
    });
  </script>
</body>
</html>
