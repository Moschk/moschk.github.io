<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS Map Visualization - Alpinismo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 600px;
      border: 1px solid #ccc;
    }
    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>Alpinismo - Locations Map</h1>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <script>
    // Initialize map
    const map = L.map('map').setView([46.5, 12.2], 7);
    
    // Add tile layer (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Load and parse CSV
    Papa.parse('sources/csv/vie.csv', {
      download: true,
      complete: function(results) {
        console.log('Total rows:', results.data.length);
        console.log('Row 6 (headers):', results.data[6]);
        
        // Get headers from row 6 (0-indexed)
        const headers = results.data[6];
        
        if (!headers) {
          console.error('Headers not found at row 6');
          return;
        }
        
        // Get data rows starting from row 7
        const rows = results.data.slice(7);
        console.log('Data rows:', rows.length);
        
        // Find column indices
        const latIndex = headers.indexOf('lat');
        const lngIndex = headers.indexOf('lng');
        const nameIndex = headers.indexOf('NOME CIMA');
        const noteIndex = headers.indexOf('NOTE');
        
        console.log('Column indices - lat:', latIndex, 'lng:', lngIndex, 'name:', nameIndex, 'note:', noteIndex);
        
        let markersAdded = 0;
        
        rows.forEach((row, idx) => {
          const lat = parseFloat(row[latIndex]);
          const lng = parseFloat(row[lngIndex]);
          const name = row[nameIndex];
          const note = row[noteIndex];
          
          // Only create marker if lat/lng are valid numbers
          if (!isNaN(lat) && !isNaN(lng) && lat && lng) {
            const marker = L.marker([lat, lng])
              .bindPopup(`<b>${name}</b><br>${note || 'No notes'}`)
              .addTo(map);
            markersAdded++;
            console.log(`Marker ${markersAdded}: ${name} at [${lat}, ${lng}]`);
          }
        });
        
        console.log('Total markers added:', markersAdded);
      },
      error: function(error) {
        console.error('Error parsing CSV:', error);
      }
    });
  </script>
</body>
</html>
