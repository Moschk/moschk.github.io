name: Geocode CSV

on:
  workflow_dispatch: # Allows manual execution
  push:
    paths:
      - "sources/csv/vie_t.csv"
      - "geocode.js"

jobs:
  geocode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run geocoder
        run: node geocode.js

      - name: Commit updated CSV
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update geocoded CSV"
          file_pattern: sources/csv/vie.csv
